# Workflow name
name: Determine Env

on:
  workflow_call:
    inputs:
      environment:
        type: string
        description: directory where to run
        required: true
        default: development
    outputs:
      env_name:
        description: Computed env_name based on input or branch (i.e. development)
        value: ${{ jobs.env.outputs.env_name }}
      env_shortname:
        description: Computed env_shortname based on input or branch (i.e dev)
        value: ${{ jobs.env.outputs.env_shortname }}
      run_infra_deploy:
        description: Computed run_infra_deploy flag based on file changes
        value: ${{ jobs.env.outputs.run_infra_deploy }}
      run_app_deploy:
        description: Computed run_app_deploy flag based on file changes
        value: ${{ jobs.env.outputs.run_app_deploy }}


jobs:
  env:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      # Since push/pull_request events doesn't populate inputs, we need to set default inside the job
      # Specially for environment which is required
      - name: Set environment variables
        id: setvars
        run: |
          echo "Running on ${{github.ref_type}} ${{ github.ref }} by ${{github.actor}}"
          echo "Received env: ${{ inputs.environment }}"

          # set input environemnt else set based on branch
          if [ "x${{ inputs.environment }}" != "x" ]; then
            echo "env_name=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "env_name=development" >> $GITHUB_OUTPUT
            fi
          fi
      - name: Set env_shortname
        id: shortname
        run: |
          echo ${{ steps.setvars.outputs.env_name }}
          if [ ${{ steps.setvars.outputs.env_name }} == "production" ]; then
            echo "env_shortname=lm-prod" >> $GITHUB_OUTPUT
          else
            echo "env_shortname=lm-dev" >> $GITHUB_OUTPUT
          fi
      - name: Set deploy flags
        id: check_files
        run: |
          echo "=============== list modified files ==============="
          git diff --name-only HEAD^ HEAD

          echo "========== check paths of modified files =========="
          git diff --name-only HEAD^ HEAD > files.txt
          while IFS= read -r file
          do
            echo $file
            if [[ $file =~ cdk/ ]]; then
              echo "run_infra_deploy=true" >> $GITHUB_OUTPUT
              infra=true
            else
              echo "run_app_deploy=true" >> $GITHUB_OUTPUT
              app=true
            fi

            if [[ $infra && $app ]]; then
              break
            fi
          done < files.txt
      - name: Print runtime vars
        run: |
          echo "env_name=${{ steps.setvars.outputs.env_name }}"
          echo "env_shortname=${{ steps.shortname.outputs.env_shortname }}"
          echo "run_infra_deploy=${{ steps.check_files.outputs.run_infra_deploy }}"
          echo "run_app_deploy=${{ steps.check_files.outputs.run_app_deploy }}"
    outputs:
      env_name: ${{ steps.setvars.outputs.env_name }}
      env_shortname: ${{ steps.shortname.outputs.env_shortname }}
      run_infra_deploy: ${{ steps.check_files.outputs.run_infra_deploy }}
      run_app_deploy: ${{ steps.check_files.outputs.run_app_deploy }}
