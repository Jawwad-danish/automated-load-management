name: Build docker image and push to ECR

on:
  workflow_call:
    inputs:
      environment:
        type: string
        description: Environment where to deploy
        required: true
        default: development
      environment_shortname:
        type: string
        description: Environment shortname where to deploy (mandatory)
        required: true
        default: dev
    outputs:
      ecr_image_url:
        description: The ECR image url
        value: ${{ jobs.build-and-push-docker-image.outputs.ecr_image_url }}
      ecr_image_tag:
        description: ECR image tag
        value: ${{ jobs.build-and-push-docker-image.outputs.ecr_image_tag }}

defaults:
  run:
    working-directory: api
    shell: bash

jobs:
  build-and-push-docker-image:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 15
    outputs:
      ecr_image_url: ${{ steps.build-image.outputs.ecr_image_url }}
      ecr_image_tag: ${{ steps.build-image.outputs.ecr_image_tag }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        mask-aws-account-id: 'false'

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      with:
        mask-password: 'true'

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
        ECR_REPOSITORY: bobtail-lm
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "ecr_image_url=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "ecr_image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
